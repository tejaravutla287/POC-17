trigger: none 

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'MyAzureServiceConnection'
  resourceGroupName: 'rg-terraform-backend'
  storageAccountName: 'poc17storageacc'
  containerName: 'tfstate'
  tfstateKey: 'poc17.tfstate'
  webAppName: 'webapp-poc17-unique-name'

stages:
- stage: ProvisionInfrastructure
  displayName: '1. Terraform Plan & Apply'
  jobs:
  - job: TerraformDeploy
    steps:
    - task: DownloadBuildArtifacts@0
      inputs:
        buildType: 'specific'
        project: '$(System.TeamProject)'
        definition: '1' 
        buildVersionToDownload: 'latest'
        artifactName: 'drop-terraform'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: AzureCLI@2
      displayName: 'Install Terraform, Auto-Create Backend, and Apply'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        addSpnToEnvironment: true
        inlineScript: |
          echo "===> Installing Terraform via Snap..."
          sudo snap install terraform --classic

          echo "===> Checking and Autocreating Missing Backend Storage Assets..."
          az group create --name "$(resourceGroupName)" --location "EastUS"
          
          if ! az storage account show --name "$(storageAccountName)" --resource-group "$(resourceGroupName)" &>/dev/null; then
            echo "Storage Account not found. Provisioning standard tier dynamic storage engine..."
            az storage account create \
              --name "$(storageAccountName)" \
              --resource-group "$(resourceGroupName)" \
              --location "EastUS" \
              --sku Standard_LRS \
              --encryption-services blob
          fi
          
          az storage container create \
            --name "$(containerName)" \
            --account-name "$(storageAccountName)" \
            --auth-mode login

          echo "===> Finding the exact folder containing Terraform files..."
          TARGET_DIR=$(find $(System.ArtifactsDirectory) -name "main.tf" -exec dirname {} \; | head -n 1)
          
          if [ -z "$TARGET_DIR" ]; then
            echo "##[error] Could not find main.tf."
            exit 1
          fi
          
          cd "$TARGET_DIR"

          echo "===> Exporting Authentication tokens..."
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          echo "===> Running Backend Initialization with Auto-created Workspace..."
          terraform init -reconfigure \
            -backend-config="resource_group_name=$(resourceGroupName)" \
            -backend-config="storage_account_name=$(storageAccountName)" \
            -backend-config="container_name=$(containerName)" \
            -backend-config="key=$(tfstateKey)"

          echo "===> Executing Architecture Plan Verification..."
          terraform apply -auto-approve

- stage: DeployApplication
  displayName: '2. App Service Code Deployment'
  dependsOn: ProvisionInfrastructure
  jobs:
  - job: AppDeploy
    steps:
    - task: DownloadBuildArtifacts@0
      inputs:
        buildType: 'specific'
        project: '$(System.TeamProject)'
        definition: '1' 
        buildVersionToDownload: 'latest'
        artifactName: 'drop-app'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: AzureRmWebAppDeployment@4
      inputs:
        ConnectionType: 'AzureRM'
        azureSubscription: '$(azureServiceConnection)'
        appType: 'webApp'
        WebAppName: '$(webAppName)'
        Package: '$(System.ArtifactsDirectory)/drop-app/app.zip'
