trigger: none # Disabled automatic triggers so it can be run manually or chained after the build pipeline

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'MyAzureServiceConnection'
  resourceGroupName: 'rg-terraform-backend'
  storageAccountName: 'poc17storageacc'
  containerName: 'tfstate'
  tfstateKey: 'poc17.tfstate'
  webAppName: 'webapp-poc17-bhanu-teja' # Must exactly match var.app_service_name in variables.tf
  buildPipelineName: 'POC-17-CI' # Ensure this matches your exact Build pipeline text name string

stages:
- stage: ProvisionInfrastructure
  displayName: '1. Terraform Plan & Apply'
  jobs:
  - job: TerraformDeploy
    steps:
    - task: DownloadBuildArtifacts@0
      displayName: 'Download Latest Terraform Configuration'
      inputs:
        buildType: 'specific'
        project: '$(System.TeamProject)'
        definition: '$(buildPipelineName)' 
        buildVersionToDownload: 'latest' 
        artifactName: 'drop-terraform'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: AzureCLI@2
      displayName: 'Verify Backend, Install Terraform, and Apply'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        addSpnToEnvironment: true
        inlineScript: |
          echo "===> Installing Terraform via Snap..."
          sudo snap install terraform --classic
          
          echo "===> Natively ensuring backend alignment in CentralUS..."
          # Fixed: Enforces CentralUS region context natively to prevent 404 resource lookup failure
          az group create --name "$(resourceGroupName)" --location "CentralUS"
          
          if ! az storage account show --name "$(storageAccountName)" --resource-group "$(resourceGroupName)" &>/dev/null; then
            az storage account create \
              --name "$(storageAccountName)" \
              --resource-group "$(resourceGroupName)" \
              --location "CentralUS" \
              --sku Standard_LRS \
              --encryption-services blob
          fi
          
          az storage container create \
            --name "$(containerName)" \
            --account-name "$(storageAccountName)" \
            --auth-mode login

          echo "===> Finding the exact folder containing Terraform files..."
          TARGET_DIR=$(find $(System.ArtifactsDirectory) -name "main.tf" -exec dirname {} \; | head -n 1)
          
          if [ -z "$TARGET_DIR" ]; then
            echo "##[error] Could not find main.tf inside downloaded artifacts."
            exit 1
          fi
          
          cd "$TARGET_DIR"

          echo "===> Exporting Authentication tokens..."
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          echo "===> Clean Initializing Backend with Reconfigure..."
          terraform init -reconfigure \
            -backend-config="resource_group_name=$(resourceGroupName)" \
            -backend-config="storage_account_name=$(storageAccountName)" \
            -backend-config="container_name=$(containerName)" \
            -backend-config="key=$(tfstateKey)"

          echo "===> Applying Configuration..."
          terraform apply -auto-approve

- stage: DeployApplication
  displayName: '2. App Service Code Deployment'
  dependsOn: ProvisionInfrastructure
  jobs:
  - job: AppDeploy
    steps:
    - task: DownloadBuildArtifacts@0
      inputs:
        buildType: 'specific'
        project: '$(System.TeamProject)'
        definition: '$(buildPipelineName)' 
        buildVersionToDownload: 'latest' 
        artifactName: 'drop-app'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: AzureRmWebAppDeployment@4
      displayName: 'Deploy App Package to Linux App Service'
      inputs:
        ConnectionType: 'AzureRM'
        azureSubscription: '$(azureServiceConnection)'
        appType: 'webAppLinux'
        WebAppName: '$(webAppName)'
        Package: '$(System.ArtifactsDirectory)/drop-app/app.zip'
