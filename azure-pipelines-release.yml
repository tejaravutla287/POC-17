trigger: none # Disabled automatic triggers so it can be run manually or chained after the build pipeline

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureServiceConnection: 'MyAzureServiceConnection'
  resourceGroupName: 'rg-terraform-backend'
  storageAccountName: 'stpoc17backend'
  containerName: 'tfstate'
  tfstateKey: 'poc17.tfstate'
  webAppName: 'webapp-poc17-unique-name' # Must exactly match var.app_service_name in variables.tf

stages:
- stage: ProvisionInfrastructure
  displayName: '1. Terraform Plan & Apply'
  jobs:
  - job: TerraformDeploy
    steps:
    # Dynamically pull the latest Terraform artifacts from the build pipeline without hardcoding IDs
    - task: DownloadBuildArtifacts@0
      displayName: 'Download Latest Terraform Configuration'
      inputs:
        buildType: 'specific'
        project: '$(System.TeamProject)'
        definition: '$(System.TriggeringAlias)' 
        buildVersionToDownload: 'latest' 
        artifactName: 'drop-terraform'
        downloadPath: '$(System.ArtifactsDirectory)'

    # Native Azure CLI step: Installs Snap Terraform and applies the infrastructure plan
    - task: AzureCLI@2
      displayName: 'Install Terraform and Apply'
      inputs:
        azureSubscription: '$(azureServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        addSpnToEnvironment: true
        inlineScript: |
          echo "===> Installing Terraform via Snap..."
          sudo snap install terraform --classic
          
          echo "===> Finding the exact folder containing Terraform files..."
          TARGET_DIR=$(find $(System.ArtifactsDirectory) -name "main.tf" -exec dirname {} \; | head -n 1)
          
          if [ -z "$TARGET_DIR" ]; then
            echo "##[error] Could not find main.tf inside downloaded artifacts."
            exit 1
          fi
          
          cd "$TARGET_DIR"

          echo "===> Exporting Authentication tokens..."
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          echo "===> Clean Initializing Backend with Reconfigure..."
          terraform init -reconfigure \
            -backend-config="resource_group_name=$(resourceGroupName)" \
            -backend-config="storage_account_name=$(storageAccountName)" \
            -backend-config="container_name=$(containerName)" \
            -backend-config="key=$(tfstateKey)"

          echo "===> Applying Configuration..."
          terraform apply -auto-approve

- stage: DeployApplication
  displayName: '2. App Service Code Deployment'
  dependsOn: ProvisionInfrastructure
  jobs:
  - job: AppDeploy
    steps:
    # Dynamically pull the latest application code zip package from the build pipeline context
    - task: DownloadBuildArtifacts@0
      displayName: 'Download Latest Web App Package'
      inputs:
        buildType: 'specific'
        project: '$(System.TeamProject)'
        definition: '$(System.TriggeringAlias)' 
        buildVersionToDownload: 'latest' 
        artifactName: 'drop-app'
        downloadPath: '$(System.ArtifactsDirectory)'

    # Push application code archive straight to the newly confirmed free Linux App Service target
    - task: AzureRmWebAppDeployment@4
      displayName: 'Deploy App Package to Linux App Service'
      inputs:
        ConnectionType: 'AzureRM'
        azureSubscription: '$(azureServiceConnection)'
        appType: 'webAppLinux'
        WebAppName: '$(webAppName)'
        Package: '$(System.ArtifactsDirectory)/drop-app/app.zip'
