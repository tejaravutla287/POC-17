<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Azure DevOps POC</title>
    
    <!-- 1. Load the official Application Insights Script -->
    <script src="https://azure.com" async></script>
    
    <!-- 2. Initialize with your Connection String -->
    <script>
        window.addEventListener('load', function() {
            if (window.appInsights) {
                appInsights.init({
                    connectionString: "InstrumentationKey=689c7751-4386-4a5f-8838-b691841bc416;IngestionEndpoint=https://eastus-8.in.applicationinsights.azure.com/;LiveEndpoint=https://eastus.livediagnostics.monitor.azure.com/;ApplicationId=00b3eb92-abe7-4ac0-bfb1-0bbdb63a411f"
                });
                // Send the page view event immediately
                appInsights.trackPage();
                console.log("Application Insights connected!");
            } else {
                console.error("Application Insights failed to load from CDN.");
            }
        });
    </script>
</head>
<body>
    <h1>Hello from Azure App Service via Terraform & Azure DevOps!</h1>
</body>
</html>
